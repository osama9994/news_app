name: news_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <3.11.0"

dependencies:
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.1
  cloud_firestore: ^6.1.2
  cupertino_icons: ^1.0.8
  dio: ^5.9.1
  firebase_auth: ^6.1.4
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.2
  flutter_dotenv: ^6.0.0
  share_plus: ^10.0.0
  url_launcher: ^6.3.2
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^9.1.1
  google_fonts: ^8.0.2
  google_sign_in: ^6.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.1.0
  intl: ^0.20.2
  retrofit: ^4.6.0
  shared_preferences: ^2.0.18
  shimmer: ^3.0.0
  internet_connection_checker: ^3.0.1

dev_dependencies:
  build_runner: ^2.4.6
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  retrofit_generator: ^8.2.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/placeholder.png
    - .env